  <line x1="256" y1="260" x2="256" y2="390" stroke="#8B0000" stroke-width="16" stroke-linecap="round"/>
  <line x1="256" y1="260" x2="332" y2="380" stroke="#8B0000" stroke-width="16" stroke-linecap="round"/>
  <!-- Stars -->
